# Deploy static content to GitHub Pages
name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Strip internal / non-public files
        # Defense-in-depth: Gallery Manager and other local-only tooling must
        # never ship to GitHub Pages even if accidentally force-added to git.
        run: |
          rm -rf tools "Add Photos.command"
          find . -name '__pycache__' -type d -prune -exec rm -rf {} +
          find . -name '.DS_Store' -delete
      - name: Setup Pages
        uses: actions/configure-pages@v6
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          # Upload entire repository (minus stripped internal tooling)
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
